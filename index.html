<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Green Room Sheet Generator</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="app">

    <!-- Top Bar -->
    <header>

        <h1>Green Room Sheet Generator</h1>

        <div class="top-buttons">
            <button id="uploadHeader">Upload Header</button>
            <button id="generateBtn">Generate PNG</button>
        </div>

    </header>

    <!-- Main Area -->
    <main>

        <!-- Left Panel -->
        <section class="editor">

            <h2>Editor</h2>

            <div class="form-group">

                <label>Event Name</label>

                <input
                    type="text"
                    id="eventName"
                    placeholder="LP PENCIL DRAWING">

            </div>

            <div class="toolbar">

                <button id="addRow">
                    + Add Row
                </button>

                <button id="removeRow">
                    − Remove Row
                </button>

            </div>

            <table id="editorTable">

                <thead>

                <tr>

                    <th>NO</th>
                    <th>PARTICIPANTS</th>
                    <th>BLOCK</th>
                    <th>CODE</th>
                    <th>GRADE</th>
                    <th>POINT</th>
                    <th>PLACE</th>
                    <th>SIGN</th>

                </tr>

                </thead>

                <tbody id="editorBody">

                </tbody>

            </table>

        </section>

        <!-- Right Panel -->
        <section class="previewPanel">

            <h2>Live Preview</h2>

            <div id="sheet">

                <img
                    src="assets/header.png"
                    id="headerImage"
                    alt="Header">

                <h3>GREEN ROOM SHEET</h3>

                <h2 id="previewEvent">
                    LP PENCIL DRAWING
                </h2>

                <table id="previewTable">

                    <thead>

                    <tr>

                        <th>NO</th>
                        <th>PARTICIPANTS</th>
                        <th>BLOCK</th>
                        <th>CODE</th>
                        <th>GRADE</th>
                        <th>POINT</th>
                        <th>PLACE</th>
                        <th>SIGNATURE</th>

                    </tr>

                    </thead>

                    <tbody id="previewBody">

                    </tbody>

                </table>

            </div>

        </section>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
